version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vpn-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vpn-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SECRET_KEY=${SECRET_KEY}
      - FERNET_KEY=${FERNET_KEY}
      - BACKEND_DEBUG=${BACKEND_DEBUG}
      - WG_MANAGER_HOST=${WG_MANAGER_HOST}
      - WG_MANAGER_PORT=${WG_MANAGER_PORT}
      - WG_MANAGER_SECRET=${WG_MANAGER_SECRET}
      - LOG_LEVEL=${LOG_LEVEL}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - vpn-network
    restart: unless-stopped

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - BACKEND_HOST=backend
      - BACKEND_PORT=8000
      - LOG_LEVEL=${LOG_LEVEL}
    depends_on:
      - backend
    volumes:
      - ./bot:/app
    networks:
      - vpn-network
    restart: unless-stopped

  wg-manager:
    build:
      context: ./wg-manager
      dockerfile: Dockerfile
    environment:
      - WG_MANAGER_PORT=${WG_MANAGER_PORT}
      - WG_MANAGER_SECRET=${WG_MANAGER_SECRET}
      - LOG_LEVEL=${LOG_LEVEL}
    ports:
      - "8001:8001"
    volumes:
      - ./wg-manager:/app
      - /etc/wireguard:/etc/wireguard
    networks:
      - vpn-network
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - bot
    networks:
      - vpn-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  vpn-network:
    driver: bridge
